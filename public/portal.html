<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e40af">
    <title>Landlord Portal - Phiyalistings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #1e40af;
            --accent: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
            --success: #16a34a;
            --warning: #d97706;
            --danger: #dc2626;
            --radius: 10px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #3b82f6;
                --accent: #60a5fa;
                --bg: #0f172a;
                --surface: #1e293b;
                --text: #f1f5f9;
                --text-secondary: #cbd5e1;
                --border: #334155;
                --success: #22c55e;
                --warning: #f59e0b;
                --danger: #ef4444;
            }
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .header {
            background: var(--primary);
            color: #fff;
            padding: 1.25rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .header-brand { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.02em; }
        .header-landlord { font-size: 0.875rem; opacity: 0.85; }

        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }

        /* Summary cards */
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
        }
        .card-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.25rem; }
        .card-value { font-size: 1.5rem; font-weight: 700; }
        .card-value.revenue { color: var(--accent); }
        .card-value.payout { color: var(--success); }

        /* Section */
        .section { margin-bottom: 2rem; }
        .section-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; }

        /* Properties */
        .prop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .prop-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
        }
        .prop-name { font-weight: 600; margin-bottom: 0.25rem; }
        .prop-detail { font-size: 0.85rem; color: var(--text-secondary); }

        /* Bookings table */
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; font-size: 0.875rem; }
        th, td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th { background: var(--primary); color: #fff; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
        tr:last-child td { border-bottom: none; }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-confirmed { background: #dcfce7; color: #166534; }
        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-cancelled { background: #fee2e2; color: #991b1b; }
        @media (prefers-color-scheme: dark) {
            .badge-confirmed { background: #14532d; color: #86efac; }
            .badge-pending { background: #713f12; color: #fde68a; }
            .badge-cancelled { background: #7f1d1d; color: #fca5a5; }
        }

        /* Download link */
        .download-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 2rem;
        }
        .download-bar label { font-size: 0.875rem; color: var(--text-secondary); }
        .download-bar select {
            padding: 0.4rem 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface);
            color: var(--text);
            font-size: 0.875rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
        .btn:hover { opacity: 0.9; }

        /* Skeleton */
        .skeleton { border-radius: var(--radius); background: var(--border); animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .skel-card { height: 90px; }
        .skel-row { height: 18px; margin-bottom: 0.6rem; width: 60%; }
        .skel-table { height: 200px; }

        /* Error */
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
        }
        .error-icon { font-size: 3rem; margin-bottom: 1rem; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .error-msg { color: var(--text-secondary); max-width: 400px; }

        /* Responsive */
        @media (max-width: 640px) {
            .cards { grid-template-columns: 1fr 1fr; }
            .card-value { font-size: 1.2rem; }
            th, td { padding: 0.5rem 0.65rem; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="header-brand">Phiyalistings</div>
        <div class="header-landlord" id="landlordName">Landlord Portal</div>
    </div>
</div>

<div class="container">
    <!-- Loading skeleton -->
    <div id="skeleton">
        <div class="cards">
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
            <div class="skeleton skel-card"></div>
        </div>
        <div class="skeleton skel-row" style="width:30%"></div>
        <div class="skeleton skel-row" style="width:50%"></div>
        <div class="skeleton skel-row" style="width:40%"></div>
        <div class="skeleton skel-table" style="margin-top:1rem"></div>
    </div>

    <!-- Error state (hidden) -->
    <div id="errorState" style="display:none">
        <div class="error-page">
            <div class="error-icon">&#128274;</div>
            <div class="error-title">Invalid or expired link</div>
            <p class="error-msg">This portal link is no longer valid. Please contact Phiyalistings to request a new one.</p>
        </div>
    </div>

    <!-- Content (hidden until loaded) -->
    <div id="content" style="display:none">
        <div class="cards" id="summaryCards"></div>

        <div class="download-bar" id="downloadBar">
            <label for="monthSelect">Payout Statement:</label>
            <select id="monthSelect"></select>
            <a id="downloadBtn" class="btn" href="#" download>
                &#8681; Download
            </a>
        </div>

        <div class="section">
            <div class="section-title">Properties</div>
            <div class="prop-grid" id="propGrid"></div>
        </div>

        <div class="section">
            <div class="section-title">Bookings</div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Guest</th>
                            <th>Property</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Revenue</th>
                            <th>Payout</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
(function () {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) { showError(); return; }

    fetch('/api/portal/data?token=' + encodeURIComponent(token))
        .then(function (res) {
            if (!res.ok) throw new Error('Unauthorized');
            return res.json();
        })
        .then(render)
        .catch(showError);

    function koboToNaira(val) {
        return '\u20A6' + (val / 100).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtDate(d) {
        if (!d) return '-';
        return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function badgeClass(status) {
        var s = (status || '').toLowerCase();
        if (s === 'confirmed' || s === 'completed') return 'badge-confirmed';
        if (s === 'cancelled' || s === 'canceled') return 'badge-cancelled';
        return 'badge-pending';
    }

    function showError() {
        document.getElementById('skeleton').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
    }

    function render(data) {
        var landlord = data.landlord || {};
        var properties = data.properties || [];
        var bookings = data.bookings || [];
        var summary = data.summary || {};

        // Header
        document.getElementById('landlordName').textContent = landlord.name ? landlord.name + "'s Portal" : 'Landlord Portal';
        document.title = (landlord.name || 'Landlord') + ' - Phiyalistings Portal';

        // Summary cards
        var cardsHtml =
            '<div class="card"><div class="card-label">Total Revenue</div><div class="card-value revenue">' + koboToNaira(summary.totalRevenue || 0) + '</div></div>' +
            '<div class="card"><div class="card-label">Your Payout</div><div class="card-value payout">' + koboToNaira(summary.totalPayout || 0) + '</div></div>' +
            '<div class="card"><div class="card-label">Bookings</div><div class="card-value">' + (summary.bookingCount || 0) + '</div></div>';
        document.getElementById('summaryCards').innerHTML = cardsHtml;

        // Properties
        var propHtml = '';
        for (var i = 0; i < properties.length; i++) {
            var p = properties[i];
            propHtml += '<div class="prop-card">' +
                '<div class="prop-name">' + esc(p.name || p.title || 'Property') + '</div>' +
                (p.address ? '<div class="prop-detail">' + esc(p.address) + '</div>' : '') +
                (p.type ? '<div class="prop-detail">' + esc(p.type) + '</div>' : '') +
                '</div>';
        }
        document.getElementById('propGrid').innerHTML = propHtml || '<p style="color:var(--text-secondary)">No properties found.</p>';

        // Bookings table
        var rowsHtml = '';
        for (var j = 0; j < bookings.length; j++) {
            var b = bookings[j];
            rowsHtml += '<tr>' +
                '<td>' + esc(b.guestName || '-') + '</td>' +
                '<td>' + esc(b.propertyName || b.property || '-') + '</td>' +
                '<td>' + fmtDate(b.checkIn) + '</td>' +
                '<td>' + fmtDate(b.checkOut) + '</td>' +
                '<td>' + koboToNaira(b.revenue || 0) + '</td>' +
                '<td>' + koboToNaira(b.payout || 0) + '</td>' +
                '<td><span class="badge ' + badgeClass(b.status) + '">' + esc(b.status || 'pending') + '</span></td>' +
                '</tr>';
        }
        document.getElementById('bookingsBody').innerHTML = rowsHtml || '<tr><td colspan="7" style="text-align:center;color:var(--text-secondary)">No bookings yet.</td></tr>';

        // Download month selector
        var months = buildMonthOptions();
        var sel = document.getElementById('monthSelect');
        for (var m = 0; m < months.length; m++) {
            var opt = document.createElement('option');
            opt.value = months[m].value;
            opt.textContent = months[m].label;
            sel.appendChild(opt);
        }
        updateDownloadLink(landlord.id || landlord._id || '');
        sel.addEventListener('change', function () { updateDownloadLink(landlord.id || landlord._id || ''); });

        // Swap skeleton for content
        document.getElementById('skeleton').style.display = 'none';
        document.getElementById('content').style.display = 'block';
    }

    function updateDownloadLink(landlordId) {
        var month = document.getElementById('monthSelect').value;
        document.getElementById('downloadBtn').href = '/api/invoices/payout?landlordId=' + encodeURIComponent(landlordId) + '&month=' + encodeURIComponent(month);
    }

    function buildMonthOptions() {
        var opts = [];
        var now = new Date();
        for (var i = 0; i < 6; i++) {
            var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            var val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            var label = d.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            opts.push({ value: val, label: label });
        }
        return opts;
    }

    function esc(str) {
        var el = document.createElement('span');
        el.textContent = str;
        return el.innerHTML;
    }
})();
</script>

</body>
</html>
